<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoLOS - My WebOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div id="desktop">

    <div id="desktop">
        
        <div class="window" id="window-about">
            <div class="window-header">
                <span class="window-title">About Me</span>
                <div class="window-controls">
                    <button class="control-btn min-btn">—</button>
                    <button class="control-btn max-btn">▢</button>
                    <button class="control-btn close-btn">X</button>
                </div>
            </div>
            
            
            <div class="window-body">
                <h3>Welcome to LoLOS!</h3>
                <p>I'm a 10th grade student learning web development. This is my personal WebOS project built for the Hack Club Stardance marathon.</p>
                <p>Currently, Im building the window system. Next, I'll make this window draggable using JavaScript!</p>
            </div>
        </div>

    </div>
    </div>

    
    <div id="taskbar">
        <button id="start-btn">Start</button>
        
        <div id="taskbar-apps">
            
        </div>
        
        <div id="clock"></div>
    </div>

    <script src="script.js"></script>
</body>
